<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Audio</title>
</head>
<body style="text-align:center; margin-top:50px;">

<h2>Touchez l’écran pour lancer l’audio</h2>

<img id="monImage" src="sacrement.jpg" alt="Scène de mariage dans une église" style="max-width:100%; height:auto; display:none; margin-top:50px;">

<audio id="audio" autoplay>
  <source src="AUDIO-2026-04-01-15-32-47.m4a" type="audio/mp4">
</audio>

<script>
  document.body.addEventListener('click', function() {
    const audio = document.getElementById('audio');
    const image = document.getElementById('monImage');

    audio.play();               // lance l'audio
    image.style.display = 'block'; // affiche l'image
  });
</script>

</body>
</html>
