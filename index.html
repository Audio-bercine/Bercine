<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Audio</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      text-align: center;
      margin-top: 50px;
      font-family: 'Arial', sans-serif;
      background-color: #fff8f0;
    }

    h2 {
      margin-bottom: 30px;
    }

    .date {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #b5651d; /* couleur chaude style mariage */
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

  <h2>Touchez l’écran pour lancer l’audio</h2>
  <div class="date">3 avril 1961</div>

  <audio id="audio" autoplay>
    <source src="AUDIO-2026-04-01-15-32-47.m4a" type="audio/mp4">
  </audio>

  <script>
    document.body.addEventListener('click', function() {
      document.getElementById('audio').play();
    });
  </script>

</body>
</html>
