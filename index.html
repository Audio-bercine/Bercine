<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Audio</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Arial', sans-serif;
      background: url('sacrement.jpg') center center / cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #b5651d;
      background-color: #fff8f0;
      text-align: center;
      transition: background-color 0.5s;
    }

    h2 {
      margin-bottom: 30px;
      background-color: rgba(255, 248, 240, 0.6);
      padding: 10px 20px;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .date {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      margin-bottom: 40px;
      background-color: rgba(255, 248, 240, 0.6);
      padding: 10px 20px;
      border-radius: 10px;
    }

    .status {
      font-size: 24px;
      margin-top: 20px;
      opacity: 0;
      transition: opacity 0.5s;
    }

    .active {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h2 id="title">Touchez l’écran pour lancer l’audio</h2>
  <div class="date">3 avril 1961</div>
  <div class="status" id="status">🎵 Partagez cette joie et ces souvenirs au son de cette musique.</div>

  <audio id="audio">
    <source src="AUDIO-2026-04-01-15-32-47.m4a" type="audio/mp4">
  </audio>

  <script>
    const audio = document.getElementById('audio');
    const title = document.getElementById('title');
    const status = document.getElementById('status');

    // Jouer la musique au clic
    document.body.addEventListener('click', function() {
      audio.play();
      title.textContent = "Bernard & Francine";
      status.classList.add('active');
    }, { once: true }); // "once" empêche de relancer l'événement à chaque clic

    // Gérer le relancement avec un effet visuel
    audio.addEventListener('ended', function() {
      audio.currentTime = 0;
      audio.play();

      // Effet visuel temporaire à chaque boucle
      document.body.style.backgroundColor = '#fff0e0';
      setTimeout(() => {
        document.body.style.backgroundColor = '#fff8f0';
      }, 300);

      // Flash du message "Partagez cette joie et ces souvenirs au son de cette musique."
      status.classList.remove('active');
      setTimeout(() => status.classList.add('active'), 50);
    });
  </script>
</body>
</html>
